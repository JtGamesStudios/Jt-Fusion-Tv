<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JT Fusion | Streaming</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Ícones (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header Fixo -->
    <header class="navbar">
        <div class="logo">
            <!-- Caso tenha logo, substitua pelo <img> da pasta /assets/logos -->
            <h1>JT <span>Fusion</span></h1>
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Pesquisar filmes, séries, gêneros...">
        </div>
    </header>

    <main>
        <!-- Banner Principal Destaque -->
        <section id="hero" class="hero-banner">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h2 id="heroTitle">Carregando...</h2>
                <div class="hero-meta">
                    <span id="heroYear"></span>
                    <span id="heroRating" class="rating"></span>
                    <span id="heroDuration"></span>
                    <span id="heroGenre" class="genre"></span>
                </div>
                <p id="heroDesc"></p>
                <div class="hero-actions">
                    <button id="heroPlayBtn" class="btn primary"><i class="fas fa-play"></i> Assistir</button>
                    <button class="btn secondary"><i class="fas fa-info-circle"></i> Mais Info</button>
                </div>
            </div>
            <!-- Controles manuais do banner -->
            <div class="hero-indicators" id="heroIndicators"></div>
        </section>

        <!-- Container do Catálogo Dinâmico -->
        <div id="catalogContainer" class="catalog"></div>
    </main>

    <!-- Player de Vídeo Customizado -->
    <div id="playerModal" class="player-modal hidden">
        <div class="player-wrapper">
            <button id="closePlayer" class="btn-close-player"><i class="fas fa-arrow-left"></i> Voltar</button>
            <video id="mainVideo" class="custom-video"></video>
            
            <div class="player-controls">
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="controls-row">
                    <div class="controls-left">
                        <button id="playPauseBtn"><i class="fas fa-play" id="playIcon"></i></button>
                        <button id="muteBtn"><i class="fas fa-volume-up" id="volumeIcon"></i></button>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                        <span id="timeDisplay">00:00 / 00:00</span>
                    </div>
                    <div class="controls-right">
                        <!-- Estrutura preparada para expansão futura -->
                        <button title="Legendas (Em breve)"><i class="fas fa-closed-captioning"></i></button>
                        <button title="Qualidade (Em breve)"><i class="fas fa-cog"></i></button>
                        <button id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
